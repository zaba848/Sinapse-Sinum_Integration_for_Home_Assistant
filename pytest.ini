[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short

markers =
    hardware: tests requiring real hardware (hub connectivity)
    quality: quality/coverage validation tests
    smoke: smoke/sanity tests for quick CI validation
    slow: slow-running tests (>2s)

# Coverage gates
# CI enforces global line coverage at 100%.
# scripts/validate_coverage_gates.py also enforces 100% on critical modules.
