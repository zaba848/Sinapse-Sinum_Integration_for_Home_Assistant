[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short

markers =
    hardware: tests requiring real hardware (hub connectivity)
    quality: quality/coverage validation tests
    smoke: smoke/sanity tests for quick CI validation
    slow: slow-running tests (>2s)

# Per-module coverage thresholds
# api.py should reach 90% (currently 85%)
# light.py should reach 90% (currently 85%)
# cover.py should reach 90% (currently 86%)
# sensor_virtual.py should reach 90% (currently 87%)
# Global minimum: 80% (gate)
