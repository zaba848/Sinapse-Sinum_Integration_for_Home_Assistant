name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install "ruff==0.15.17" mypy
      - name: Ruff check
        run: ruff check custom_components/
      - name: Ruff format check
        run: ruff format --check custom_components/
      - name: Mypy
        run: mypy custom_components/sinum/ --ignore-missing-imports --no-site-packages
