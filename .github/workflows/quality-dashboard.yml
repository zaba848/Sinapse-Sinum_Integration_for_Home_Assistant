name: CI Quality Dashboard

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Generate dashboard
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/ci_quality_dashboard.py

      - name: Commit dashboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci_quality_dashboard.md
          git diff --cached --quiet || git commit -m "chore: update CI quality dashboard"
          git push
