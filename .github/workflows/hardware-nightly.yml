name: Hardware Nightly Smoke Test

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      hubs:
        description: "Comma-separated LABEL=URL list"
        required: false
        default: ""

jobs:
  hardware_smoke_test:
    name: Hardware Smoke Test
    runs-on: [self-hosted, sinum-lan]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run read-only hardware smoke
        env:
          SINUM_SMOKE_HUBS: ${{ github.event.inputs.hubs || vars.SINUM_SMOKE_HUBS }}
          SINUM_USERNAME: ${{ secrets.SINUM_USERNAME || 'admin' }}
          SINUM_PASSWORD: ${{ secrets.SINUM_PASSWORD }}
          SINUM_API_TOKEN: ${{ secrets.SINUM_API_TOKEN }}
          SINUM_WTP_TOKEN: ${{ secrets.SINUM_WTP_TOKEN }}
          SINUM_SBUS_TOKEN: ${{ secrets.SINUM_SBUS_TOKEN }}
          SINUM_VIDEO_TOKEN: ${{ secrets.SINUM_VIDEO_TOKEN }}
        run: python3 scripts/hardware_smoke_check.py

      - name: Publish hardware summary
        if: always()
        run: |
          cat docs/hardware_smoke_latest.md >> "$GITHUB_STEP_SUMMARY"
