name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check code scanning availability
        id: scanning_check
        run: |
          status_code=$(curl -sS -o /tmp/code-scanning-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")

          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code scanning is enabled for this repository."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning is not enabled (HTTP $status_code). Skipping CodeQL analysis to keep CI green."
          fi

      - name: Initialize CodeQL
        if: steps.scanning_check.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        if: steps.scanning_check.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

      - name: CodeQL skipped notice
        if: steps.scanning_check.outputs.enabled != 'true'
        run: |
          echo "CodeQL skipped because code scanning is disabled in repository settings."
