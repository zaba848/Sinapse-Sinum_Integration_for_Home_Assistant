name: Functional Smoke Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run functional smoke tests
        run: |
          pytest -q \
            tests/test_api.py \
            tests/test_api_extended.py \
            tests/test_config_flow.py \
            tests/test_coordinator.py \
            tests/test_event.py \
            tests/test_mqtt.py \
            tests/test_protocol_contracts.py
