name: Release Gate

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check required workflows status
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/check_release_gate.py
