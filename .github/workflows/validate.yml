name: HACS Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch HACS requirement changes
    - cron: "0 6 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
