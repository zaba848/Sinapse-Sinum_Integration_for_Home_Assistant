name: HACS Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch HACS requirement changes
    - cron: "0 6 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    # HACS store validation requires a public GitHub repository.
    # Skip on private repos — the check will pass automatically once the repo is made public.
    if: github.event.repository.private == false || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
