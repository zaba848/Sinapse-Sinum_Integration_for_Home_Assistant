name: Bug Report
description: Report a bug in the Sinum integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2024.6.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Sinum integration version
      placeholder: "0.2.4"
    validations:
      required: true

  - type: input
    id: hub_firmware
    attributes:
      label: Sinum hub firmware version
      placeholder: "1.24.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Enable debug logging for `custom_components.sinum` and paste relevant lines.
      render: text
    validations:
      required: false
