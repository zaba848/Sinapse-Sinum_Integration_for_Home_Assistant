<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#ffffff"/>
  
  <!-- House outline -->
  <path d="M 50 180 L 50 100 L 128 40 L 206 100 L 206 180 Z" 
        fill="none" stroke="#2E5090" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Door -->
  <rect x="110" y="145" width="36" height="50" 
        fill="none" stroke="#2E5090" stroke-width="3" rx="2"/>
  <!-- Door knob -->
  <circle cx="140" cy="170" r="2" fill="#2E5090"/>
  
  <!-- Windows -->
  <rect x="70" y="110" width="28" height="28" 
        fill="none" stroke="#2E5090" stroke-width="2" rx="2"/>
  <line x1="84" y1="110" x2="84" y2="138" stroke="#2E5090" stroke-width="2"/>
  <line x1="70" y1="124" x2="98" y2="124" stroke="#2E5090" stroke-width="2"/>
  
  <rect x="158" y="110" width="28" height="28" 
        fill="none" stroke="#2E5090" stroke-width="2" rx="2"/>
  <line x1="172" y1="110" x2="172" y2="138" stroke="#2E5090" stroke-width="2"/>
  <line x1="158" y1="124" x2="186" y2="124" stroke="#2E5090" stroke-width="2"/>
  
  <!-- Roof accent (electronic circuit element) -->
  <circle cx="128" cy="55" r="8" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <circle cx="128" cy="55" r="3" fill="#4CAF50"/>
  
  <!-- Small circuit lines -->
  <line x1="120" y1="55" x2="110" y2="55" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="136" y1="55" x2="146" y2="55" stroke="#4CAF50" stroke-width="1.5"/>
  
  <!-- Brand text -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="20" 
        font-weight="bold" text-anchor="middle" fill="#2E5090">SINUM</text>
</svg>
